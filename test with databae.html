<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P倉寫貨系統 - 待查機優化版</title>
    <!-- 使用 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 SheetJS 用於匯出 Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f4f7f6; }
        .tab-active-C { background-color: #007bff !important; color: white !important; }
        .tab-active-L2PM { background-color: #28a745 !important; color: white !important; }
        .tab-active-SFI { background-color: #fd7e14 !important; color: white !important; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .icon-trash {
            display: inline-block;
            width: 18px;
            height: 18px;
            background-color: currentColor;
            -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M3 6h18v2H3V6m2 3h14v13a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V9m3 3v7h2v-7H8m4 0v7h2v-7h-2m4 0v7h2v-7h-2M9 4l1-1h4l1 1h5v2H4V4h5z'/></svg>") no-repeat center;
            mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M3 6h18v2H3V6m2 3h14v13a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V9m3 3v7h2v-7H8m4 0v7h2v-7h-2m4 0v7h2v-7h-2M9 4l1-1h4l1 1h5v2H4V4h5z'/></svg>") no-repeat center;
        }
        .icon-check {
            display: inline-block;
            width: 22px;
            height: 22px;
            background-color: currentColor;
            -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z'/></svg>") no-repeat center;

        }

        @keyframes pulse-yellow {
            0%, 100% { background-color: #fef3c7; }
            50% { background-color: #fde68a; }
        }
        .warning-duplicate { animation: pulse-yellow 1s infinite; border-left: 5px solid #f59e0b !important; }

</head>
<body class="p-3 pb-10">

    <div class="max-w-md mx-auto">
        <!-- 類別 Tabs -->
        <div class="flex gap-1.5 mb-3 sticky top-0 z-50 bg-[#f4f7f6] py-2 no-scrollbar overflow-x-auto">
            <button onclick="setCat('L2PM')" id="tab-L2PM" class="flex-1 min-w-[80px] py-3 text-sm font-bold rounded-lg bg-gray-200 text-gray-500 transition-all tab-active-L2PM">📦 L2PM</button>
            <button onclick="setCat('C')" id="tab-C" class="flex-1 min-w-[80px] py-3 text-sm font-bold rounded-lg bg-gray-200 text-gray-500 transition-all">❄️ C</button>
            <button onclick="setCat('SFI')" id="tab-SFI" class="flex-1 min-w-[80px] py-3 text-sm font-bold rounded-lg bg-gray-200 text-gray-500 transition-all">💰 SFI</button>
        </div>

        <!-- 輸入區塊 -->
        <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 mb-4">
            <input type="text" id="drugId" oninput="handleIdInput()" placeholder="輸入 Item Code" class="w-full p-3.5 mb-2 border-2 border-gray-100 rounded-lg text-lg focus:border-blue-400 outline-none uppercase font-bold">
            
            <div id="drugInfoBox" class="min-h-[60px] p-3 rounded-md mb-3 text-sm transition-all bg-gray-50 border-l-[5px] border-gray-300">
                <div id="drugInfoContent" class="text-gray-400 flex items-center gap-2 py-2">等待輸入...</div>
            </div>

            <div class="flex gap-2 mb-3">
                <input type="number" id="qty" placeholder="數量" class="flex-1 p-3.5 border-2 border-gray-100 rounded-lg text-lg outline-none focus:border-blue-400 font-bold">
                <button onclick="addEntry('pending')" class="w-16 bg-yellow-500 text-white rounded-lg font-bold text-2xl active:bg-yellow-600 transition-colors flex items-center justify-center shadow-md" title="加入待查機清單">🔍</button>
            </div>

            <button onclick="addEntry('delivery')" class="w-full py-4 bg-[#333] text-white rounded-xl font-bold text-lg active:bg-black transition-colors shadow-lg">加入出貨清單</button>
        </div>

        <!-- 導出按鈕 -->
        <div class="mb-4">
            <button onclick="exportExcel()" class="w-full flex items-center justify-center gap-2 bg-green-700 text-white py-3 rounded-xl font-bold text-sm shadow-sm active:bg-green-900">
                📊 匯出綜合清單 (Excel)
            </button>
        </div>

        <!-- 出貨清單 -->
        <div class="bg-white rounded-xl shadow-sm overflow-hidden mb-6 border border-gray-100">
            <div class="p-3 bg-gray-800 text-white font-bold flex items-center gap-2 text-sm">
                📋 出貨清單 <span id="count-delivery" class="ml-auto bg-white text-gray-800 px-2 rounded-full text-xs">0</span>
            </div>
            <table class="w-full text-left border-collapse table-fixed" id="table-delivery">
                <thead>
                    <tr class="bg-gray-50 border-b border-gray-100">
                        <th class="p-3 text-[11px] font-bold text-gray-400 uppercase w-10 text-center">Sec</th>
                        <th class="p-3 text-[11px] font-bold text-gray-400 uppercase">藥名 / 資訊</th>
                        <th class="p-3 text-[11px] font-bold text-gray-400 uppercase w-16 text-center">量</th>
                        <th class="p-3 w-10 text-center"></th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-50 text-[13px]"></tbody>
            </table>
        </div>

        <!-- 待查機清單 -->
        <div class="bg-yellow-50 rounded-xl shadow-sm overflow-hidden mb-6 border border-yellow-200">
            <div class="p-3 bg-yellow-500 text-white font-bold flex items-center gap-2 text-sm">
                ⏳ 待查機清單 <span id="count-pending" class="ml-auto bg-white text-yellow-500 px-2 rounded-full text-xs">0</span>
            </div>
            <table class="w-full text-left border-collapse table-fixed" id="table-pending">
                <thead>
                    <tr class="bg-yellow-100/50 border-b border-yellow-100">
                        <th class="p-3 text-[11px] font-bold text-yellow-700 uppercase w-10 text-center">Sec</th>
                        <th class="p-3 text-[11px] font-bold text-yellow-700 uppercase">藥名 / 資訊</th>
                        <th class="p-3 text-[11px] font-bold text-yellow-700 uppercase w-16 text-center">量</th>
                        <th class="p-3 w-12 text-center">操作</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-yellow-100 text-[13px]"></tbody>
            </table>
        </div>
    </div>

            }
        };
        const catColors = { "C": "#007bff", "L2PM": "#28a745", "SFI": "#fd7e14" };
        const catIcons = { "C": "❄️", "L2PM": "📦", "SFI": "💰" };
        const catPriority = { "L2PM": 1, "C": 2, "SFI": 3 };
        
        let currentCat = 'L2PM';
        let records = []; 

        function setCat(cat) {
            currentCat = cat;
            ['C', 'L2PM', 'SFI'].forEach(c => {
                const btn = document.getElementById(`tab-${c}`);
                btn.classList.remove('tab-active-C', 'tab-active-L2PM', 'tab-active-SFI');
                if (c === cat) btn.classList.add(`tab-active-${c}`);
            });
            updateMatchedUI();
        }

        function getDrugInfo(id) {
            id = id.trim().toUpperCase();
            for (let cat in drugMaster) {
                if (drugMaster[cat][id]) return { info: drugMaster[cat][id], cat };
            }
            return null;
        }

        function handleIdInput() {
            const id = document.getElementById('drugId').value;
            const matched = getDrugInfo(id);
            if (matched && matched.cat !== currentCat) {
                setCat(matched.cat);
            }
            updateMatchedUI();
        }

        function updateMatchedUI() {
            const idInput = document.getElementById('drugId').value.trim().toUpperCase();
            const matched = getDrugInfo(idInput);
            const box = document.getElementById('drugInfoBox');
            const content = document.getElementById('drugInfoContent');
            const isDuplicate = records.some(r => r.id === idInput);
            box.classList.remove('warning-duplicate');

            if (matched) {
                box.style.borderLeftColor = catColors[matched.cat];
                let html = `<div>
                    <div class="font-bold text-blue-600 text-[15px]">✅ ${matched.info[0]}</div>
                    <div class="text-[13px] font-bold text-green-700 mt-0.5">📦 包裝規格: ${matched.info[3] || '--'}</div>
                    <div class="text-gray-500 mt-1 text-[12px]">儲位: ${matched.info[1]} | 月量: ${matched.info[2]}</div>`;
                if (isDuplicate) {
                    box.classList.add('warning-duplicate');
                    html += `<div class="mt-2 text-red-600 font-bold flex items-center gap-1">⚠️ 注意：此藥已在清單中！</div>`;
                }
                html += `</div>`;
                content.innerHTML = html;
            } else {
                box.style.borderLeftColor = "#ccc";
                let html = `<span class="text-gray-400">❓ ${idInput ? '未匹配藥檔' : '等待輸入...'}</span>`;
                if (idInput && isDuplicate) {
                    box.classList.add('warning-duplicate');
                    html = `<div class="font-bold text-red-600">⚠️ 此手動項目 (${idInput}) 已在清單中！</div>`;
                }
                content.innerHTML = html;
            }
        }

        function addEntry(type) {
            const id = document.getElementById('drugId').value.toUpperCase().trim();
            let q = document.getElementById('qty').value;
            if (!id) return;
            if (type === 'delivery' && (q === "" || parseFloat(q) <= 0)) {
                document.getElementById('qty').classList.add('border-red-500');
                setTimeout(() => document.getElementById('qty').classList.remove('border-red-500'), 1000);
                return;
            }
            if (q === "") q = "0";
            const matched = getDrugInfo(id);
            const existingIdx = records.findIndex(r => r.id === id && r.type === type);
            if (existingIdx !== -1) {
                if (parseFloat(q) > parseFloat(records[existingIdx].qty)) {
                    records[existingIdx].qty = q;
                }
            } else {
                records.unshift({
                    type: type, 
                    cat: matched ? matched.cat : currentCat, 
                    id: id,
                    name: matched ? matched.info[0] : "手動項目",
                    locator: matched ? matched.info[1] : "--",
                    monthlyQty: matched ? matched.info[2] : "--",
                    packSize: matched ? matched.info[3] : "--",
                    qty: q, 
                    ts: Date.now()
                });
            }
            document.getElementById('drugId').value = "";
            document.getElementById('qty').value = "";
            document.getElementById('drugId').focus();
            updateMatchedUI();
            renderTables();
        }

        function updateQty(ts, newQty, inputElem) {
            const record = records.find(r => r.ts === ts);
            if (record) {
                record.qty = newQty;
                const isZero = (parseFloat(newQty) <= 0 || newQty === "");
                
                if (record.type === 'pending') {
                    const btn = document.getElementById(`btn-check-${ts}`);
                    if (btn) {
                        if (isZero) {
                            btn.classList.add('opacity-20', 'grayscale', 'cursor-not-allowed');
                            btn.disabled = true;
                        } else {
                            btn.classList.remove('opacity-20', 'grayscale', 'cursor-not-allowed');
                            btn.disabled = false;
                        }
                    }
                } else if (record.type === 'delivery') {
                    if (isZero) inputElem.classList.add('border-red-500', 'text-red-500');
                    else inputElem.classList.remove('border-red-500', 'text-red-500');
                }
            }
            updateCounts();
        }

        function updateCounts() {
            document.getElementById(`count-delivery`).innerText = records.filter(r => r.type === 'delivery').length;
            document.getElementById(`count-pending`).innerText = records.filter(r => r.type === 'pending').length;
        }

        function moveToDelivery(ts) {
            const pendingRecord = records.find(r => r.ts === ts);
            if (!pendingRecord || parseFloat(pendingRecord.qty) <= 0) return;
            const existingDeliveryIdx = records.findIndex(r => r.id === pendingRecord.id && r.type === 'delivery');
            if (existingDeliveryIdx !== -1) {
                if (parseFloat(pendingRecord.qty) > parseFloat(records[existingDeliveryIdx].qty)) {
                    records[existingDeliveryIdx].qty = pendingRecord.qty;
                }
                records = records.filter(r => r.ts !== ts);
            } else {
                pendingRecord.type = 'delivery';
            }
            renderTables();
        }

        function delEntry(ts) {
            records = records.filter(r => r.ts !== ts);
            renderTables();
        }

        function sortRecords(arr) {
            return arr.sort((a, b) => {
                if (catPriority[a.cat] !== catPriority[b.cat]) return catPriority[a.cat] - catPriority[b.cat];
                return a.locator.localeCompare(b.locator);
            });
        }

        function renderTables() {
            const types = ['delivery', 'pending'];
            types.forEach(type => {
                const tbody = document.querySelector(`#table-${type} tbody`);
                const filtered = sortRecords(records.filter(r => r.type === type));
                document.getElementById(`count-${type}`).innerText = filtered.length;

                tbody.innerHTML = filtered.map(r => {
                    const isQtyZero = (parseFloat(r.qty) <= 0 || r.qty === "");
                    return `
                    <tr class="transition-colors ${type === 'pending' ? 'hover:bg-yellow-100/50' : 'hover:bg-gray-50'}">
                        <td class="p-2 text-center align-middle"><span class="text-[18px] block">${catIcons[r.cat]}</span></td>
                        <td class="p-3 py-4">
                            <div class="font-bold text-gray-800 break-words leading-tight mb-0.5 text-[14px]">${r.name}</div>
                            <div class="text-[11px] font-bold text-green-700 mb-1">📦 ${r.packSize}</div>
                            <div class="flex flex-wrap items-center gap-2 mt-1">
                                <span class="text-[10px] text-gray-400 font-mono bg-white/50 border border-gray-100 px-1 rounded">${r.id}</span>
                                <span class="text-[10px] font-bold text-blue-500 border border-blue-200 px-1 rounded bg-white/80">📍 ${r.locator}</span>
                                <span class="text-[10px] text-orange-500 border border-orange-200 px-1 rounded bg-white/80">📊 ${r.monthlyQty}</span>
                            </div>
                        </td>
                        <td class="p-2 align-middle">
                            <input type="number" value="${r.qty}" oninput="updateQty(${r.ts}, this.value, this)" class="w-full text-center font-bold text-lg bg-white/70 border border-gray-200 rounded py-1 outline-none focus:border-blue-400 ${type === 'delivery' && isQtyZero ? 'border-red-500 text-red-500' : ''}">
                        </td>
                        <td class="p-2 text-center align-middle">
                            <div class="flex flex-col items-center gap-2">
                                ${type === 'pending' ? `
                                    <button id="btn-check-${r.ts}" onclick="moveToDelivery(${r.ts})" 
                                            class="text-green-600 active:scale-90 transition-all ${isQtyZero ? 'opacity-20 grayscale cursor-not-allowed' : 'opacity-100'}" 
                                            ${isQtyZero ? 'disabled' : ''}>
                                        <i class="icon-check"></i>
                                    </button>
                                    <button onclick="delEntry(${r.ts})" class="text-red-400 active:scale-90 transition-transform"><i class="icon-trash" style="width:14px; height:14px;"></i></button>
                                ` : `
                                    <button onclick="delEntry(${r.ts})" class="text-red-400 active:scale-90 transition-transform p-1"><i class="icon-trash"></i></button>
                                `}
                            </div>
                        </td>
                    </tr>
                `}).join('');
                if (filtered.length === 0) tbody.innerHTML = `<tr><td colspan="4" class="p-6 text-center text-gray-300 text-xs italic">無紀錄</td></tr>`;
            });
        }

        function exportExcel() {
            const validRecords = records.filter(r => !(r.type === 'delivery' && (parseFloat(r.qty) <= 0 || r.qty === "")));
            if (validRecords.length === 0) return;
            const sortedRecords = sortRecords([...validRecords]);
            const data = sortedRecords.map(r => ({
                "清單類型": r.type === 'delivery' ? '出貨' : '待查機',
                "類別": r.cat, 
                "Item Code": r.id, 
                "藥名": r.name, 
                "包裝規格": r.packSize,
                "儲位 (Locator)": r.locator, 
                "月用量": r.monthlyQty, 
                "寫貨數量": r.qty
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "P倉清單");
            XLSX.writeFile(wb, `P倉寫貨清單_${new Date().toISOString().slice(0,10)}.xlsx`);
        }

        renderTables();
    </script>
